<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding-top: 100px; margin: 0;">
    
    <h1 style="color: #333333;">Welcome to the server!</h1>
    
    <form action="/message.html" method="GET" style="margin-top: 20px;">
        <input 
            type="text" 
            name="name" 
            placeholder="Enter your name" 
            style="padding: 10px; font-size: 16px; border: 1px solid #cccccc; border-radius: 5px; width: 200px;"
        >
        <button 
            type="submit" 
            style="padding: 10px 20px; font-size: 16px; background-color: #4a54a4; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px;"
        >
            Send
        </button>
    </form>

</body>
</html>
