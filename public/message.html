<!DOCTYPE html>
<html lang="en">
<head>
    <title>Message</title>
    <style>
        body { background-color: #3b428a; color: white; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .card { background-color: #4a54a4; padding: 40px; border-radius: 10px; display: inline-block; }
        a { color: white; text-decoration: none; margin-top: 20px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="greeting">Hello!</h1>
        <a href="/">Go Back</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('name');
        if (userName) {
            document.getElementById('greeting').innerText = `Hello, ${userName}!`;
        }
    </script>
</body>
</html>
